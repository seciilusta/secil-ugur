<svg width="360" height="1080" viewBox="0 0 360 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FA28B" stop-opacity=".50"/>
      <stop offset="1" stop-color="#425A45" stop-opacity=".25"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B7C61" stop-opacity=".30"/>
      <stop offset="1" stop-color="#5F6F56" stop-opacity=".45"/>
    </linearGradient>
    <style>
      .stem{stroke:url(#stem);stroke-width:2.1;stroke-linecap:round;filter:url(#soften)}
      .twig{stroke:#7d8a69;stroke-width:1.15;stroke-linecap:round;opacity:.36}
      .leaf{fill:url(#leaf);opacity:.72;filter:url(#soften)}
      .leaf2{fill:#AEB9A0;opacity:.34;filter:url(#soften)}
      .bud{fill:#C8B98E;opacity:.45}
    </style>
  </defs>

  <!-- top branch -->
  <g transform="translate(-12 20) rotate(-5 160 220)">
    <path class="stem" d="M18 270 C70 215, 106 150, 168 82 C205 42, 245 18, 318 2"/>
    <path class="twig" d="M82 200 C58 170 46 132 38 92"/>
