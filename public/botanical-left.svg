    <ellipse class="leaf2" cx="145" cy="44" rx="25" ry="14" transform="rotate(30 145 44)"/>
    <ellipse class="leaf" cx="182" cy="82" rx="35" ry="18" transform="rotate(42 182 82)"/>
    <ellipse class="leaf2" cx="230" cy="130" rx="24" ry="13" transform="rotate(20 230 130)"/>
    <ellipse class="leaf" cx="263" cy="58" rx="33" ry="17" transform="rotate(-22 263 58)"/>
    <ellipse class="leaf2" cx="302" cy="14" rx="26" ry="14" transform="rotate(30 302 14)"/>
    <circle class="bud" cx="71" cy="130" r="4"/>
    <circle class="bud" cx="96" cy="114" r="3"/>
    <circle class="bud" cx="250" cy="116" r="3.5"/>
  </g>

  <!-- middle branch -->
